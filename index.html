<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumah Belajar Excel - Pencarian File</title>
    <!-- Menggunakan Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Animasi loading spinner */
        .loader {
            border-top-color: #16a34a; /* Warna hijau Tailwind (green-600) */
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Custom scrollbar untuk sidebar agar rapi */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div class="max-w-7xl mx-auto p-4 md:p-6 mt-6">
        
        <!-- Header -->
        <div class="text-center mb-8 flex flex-col items-center">
            <img src="RBE jpg.jpg" alt="Logo Rumah Belajar Excel" class="h-24 md:h-32 mb-4 object-contain">
            <h1 class="text-3xl md:text-4xl font-bold text-green-700 mb-2">
                Rumah Belajar Excel
            </h1>
            <p class="text-gray-600 font-medium text-lg">Akses Member File Excel Bebas Tanpa Batas</p>
        </div>

        <!-- Layout Utama: Sidebar (Kiri) & Konten (Kanan) -->
        <div class="flex flex-col md:flex-row gap-6">
            
            <!-- Sidebar Kategori -->
            <aside class="w-full md:w-1/4 bg-white rounded-lg shadow-md p-5 h-fit md:sticky md:top-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex items-center">
                    <i class="fas fa-list text-green-600 mr-2"></i> Kategori
                </h2>
                
                <!-- Loading indikator khusus sidebar -->
                <div id="sidebarLoading" class="flex justify-center items-center py-4">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-6 w-6"></div>
                </div>

                <!-- Daftar Kategori -->
                <ul id="categoryList" class="space-y-2 max-h-64 md:max-h-96 overflow-y-auto custom-scrollbar pr-2 hidden">
                    <!-- Default Menu: Root Folder -->
                    <li>
                        <button onclick="openFolder(ROOT_FOLDER_ID, 'Semua File', this)" class="category-btn w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors bg-green-50 text-green-700 border border-green-200" id="btn-root">
                            <i class="fas fa-home mr-2 w-5 text-center"></i> Semua File
                        </button>
                    </li>
                    <!-- Kategori (Folder) dari Drive akan dimuat di sini -->
                </ul>
            </aside>

            <!-- Panel Utama (Pencarian & Tabel) -->
            <main class="w-full md:w-3/4 flex flex-col">
                
                <!-- Info Folder Saat Ini & Area Pencarian -->
                <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                    <div class="flex flex-col md:flex-row justify-between md:items-center mb-4 gap-2">
                        <h2 id="currentFolderName" class="text-xl font-bold text-gray-800 flex items-center">
                            <i class="fas fa-folder-open text-yellow-500 mr-2"></i> Semua File
                        </h2>
                        <!-- Tombol Kembali (Disembunyikan jika di root) -->
                        <button id="backBtn" onclick="openFolder(ROOT_FOLDER_ID, 'Semua File')" class="hidden text-sm text-green-600 hover:text-green-800 font-medium transition">
                            <i class="fas fa-arrow-left mr-1"></i> Kembali ke Awal
                        </button>
                    </div>

                    <div class="flex flex-col md:flex-row gap-3 items-center">
                        <div class="relative flex-grow w-full">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-search text-gray-400"></i>
                            </div>
                            <input type="text" id="searchInput" placeholder="Ketikkan nama file (misal: Laporan) di folder ini..." 
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition text-sm"
                                onkeypress="handleKeyPress(event)">
                        </div>
                        <button onclick="triggerSearch()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300 w-full md:w-auto flex-shrink-0 text-sm">
                            <i class="fas fa-search mr-1"></i> Cari
                        </button>
                    </div>
                </div>

                <!-- Pesan Error / Info -->
                <div id="messageArea" class="hidden text-center py-4 px-6 mb-6 rounded-lg font-medium text-sm"></div>

                <!-- Tabel Hasil -->
                <div id="tableContainer" class="bg-white rounded-lg shadow-md overflow-hidden flex-grow relative min-h-[300px]">
                    
                    <!-- Loading Indikator Tabel -->
                    <div id="loadingIndicator" class="absolute inset-0 bg-white/80 z-10 hidden flex-col justify-center items-center">
                        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                        <p class="text-green-700 font-medium text-sm animate-pulse">Memuat data...</p>
                    </div>

                    <div class="overflow-x-auto h-full">
                        <table class="w-full whitespace-nowrap min-w-full">
                            <thead class="bg-gray-50 border-b border-gray-200 sticky top-0 z-0">
                                <tr class="text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                    <th class="px-6 py-4">Nama File / Folder</th>
                                    <th class="px-6 py-4 text-center">Ukuran</th>
                                    <th class="px-6 py-4 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="fileList" class="divide-y divide-gray-200">
                                <!-- Data akan dimasukkan di sini melalui JS -->
                            </tbody>
                        </table>
                        
                        <!-- Area kosong jika data tidak ada -->
                        <div id="emptyState" class="hidden py-16 text-center">
                            <img src="https://cdn-icons-png.flaticon.com/512/7486/7486747.png" alt="Empty" class="w-24 h-24 mx-auto opacity-50 mb-4">
                            <h3 class="text-lg font-medium text-gray-600">Tidak ada file ditemukan</h3>
                            <p class="text-gray-400 text-sm mt-1">Coba gunakan kata kunci lain atau pilih kategori berbeda.</p>
                        </div>
                    </div>
                </div>
            </main>

        </div>
    </div>

    <!-- Script Utama -->
    <script>
        // === KONFIGURASI ===
        const API_KEY = 'AIzaSyCrm-_K9xGLqggF5zwklUdCVFrHgtCJX6Q';
        const ROOT_FOLDER_ID = '1JM3Etz2_R-5yAP84lfPk6y1pW-2KWVif';
        
        // State Aplikasi
        let currentFolderId = ROOT_FOLDER_ID;

        // Inisialisasi saat halaman dimuat
        document.addEventListener('DOMContentLoaded', () => {
            loadSidebarCategories();
            loadFiles(ROOT_FOLDER_ID);
        });

        // 1. Fungsi untuk memuat folder di root sebagai menu Sidebar (Kategori)
        async function loadSidebarCategories() {
            const ul = document.getElementById('categoryList');
            const loading = document.getElementById('sidebarLoading');
            
            // Query hanya mencari folder di dalam Root
            const query = `'${ROOT_FOLDER_ID}' in parents and trashed = false and mimeType = 'application/vnd.google-apps.folder'`;
            
            try {
                const url = new URL('https://www.googleapis.com/drive/v3/files');
                url.searchParams.append('q', query);
                url.searchParams.append('fields', 'files(id, name)');
                url.searchParams.append('orderBy', 'name');
                url.searchParams.append('key', API_KEY);

                const response = await fetch(url);
                const data = await response.json();

                if (response.ok && data.files && data.files.length > 0) {
                    data.files.forEach(folder => {
                        const li = document.createElement('li');
                        li.innerHTML = `
                            <button onclick="openFolder('${folder.id}', '${folder.name}', this)" class="category-btn w-full text-left px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-green-50 hover:text-green-600 transition-colors border border-transparent">
                                <i class="fas fa-folder text-yellow-400 mr-2 w-5 text-center"></i> ${folder.name}
                            </button>
                        `;
                        ul.appendChild(li);
                    });
                }
            } catch (err) {
                console.error("Gagal memuat kategori sidebar:", err);
            } finally {
                loading.classList.add('hidden');
                ul.classList.remove('hidden');
            }
        }

        // 2. Fungsi untuk membuka folder (diklik dari sidebar atau dari tabel)
        function openFolder(folderId, folderName, btnElement = null) {
            currentFolderId = folderId;
            
            // Update UI Judul
            document.getElementById('currentFolderName').innerHTML = `<i class="fas fa-folder-open text-yellow-500 mr-2"></i> ${folderName}`;
            
            // Tampilkan / Sembunyikan tombol kembali
            const backBtn = document.getElementById('backBtn');
            if (folderId !== ROOT_FOLDER_ID) {
                backBtn.classList.remove('hidden');
            } else {
                backBtn.classList.add('hidden');
            }

            // Bersihkan kolom pencarian saat pindah folder
            document.getElementById('searchInput').value = '';

            // Update styling tombol sidebar yang aktif
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.className = 'category-btn w-full text-left px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-green-50 hover:text-green-600 transition-colors border border-transparent';
            });
            
            // Jika tombol diklik langsung (dari sidebar), beri efek aktif
            if (btnElement) {
                btnElement.className = 'category-btn w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors bg-green-50 text-green-700 border border-green-200';
            } else if (folderId === ROOT_FOLDER_ID) {
                // Jika kembali ke root via tombol 'Kembali', aktifkan tombol root
                document.getElementById('btn-root').className = 'category-btn w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors bg-green-50 text-green-700 border border-green-200';
            }

            // Muat isi folder
            loadFiles(currentFolderId);
        }

        // 3. Handle pencarian
        function handleKeyPress(e) {
            if (e.key === 'Enter') triggerSearch();
        }

        function triggerSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            loadFiles(currentFolderId, keyword);
        }

        // 4. Fungsi memuat file berdasarkan Folder ID dan kata kunci pencarian
        async function loadFiles(folderId, keyword = '') {
            showTableLoading(true);
            hideMessage();
            document.getElementById('emptyState').classList.add('hidden');
            
            const tbody = document.getElementById('fileList');
            tbody.innerHTML = '';

            // Query: Ambil file di dalam folder yang sedang aktif
            let query = `'${folderId}' in parents and trashed = false`;
            
            // Jika ada kata kunci, tambahkan filter nama
            if (keyword) {
                query += ` and name contains '${keyword}'`;
            }

            try {
                const url = new URL('https://www.googleapis.com/drive/v3/files');
                url.searchParams.append('q', query);
                url.searchParams.append('fields', 'files(id, name, mimeType, size, webViewLink, webContentLink)');
                // Urutkan: Folder di atas, lalu berdasarkan nama
                url.searchParams.append('orderBy', 'folder,name');
                url.searchParams.append('key', API_KEY);

                const response = await fetch(url);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || 'Gagal mengambil data dari Google Drive');
                }

                const files = data.files;
                
                if (!files || files.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                    return;
                }

                // Render tabel
                files.forEach(file => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50 transition duration-150 border-b border-gray-100 last:border-0';
                    
                    const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
                    const downloadLink = file.webContentLink ? file.webContentLink : file.webViewLink;
                    
                    // Kolom Aksi (Tombol)
                    let actionButton = '';
                    if (isFolder) {
                        // Jika Folder: Ubah onClick agar membuka folder tersebut DI DALAM aplikasi
                        actionButton = `
                            <button onclick="openFolder('${file.id}', '${file.name.replace(/'/g, "\\'")}')" class="inline-flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white font-medium py-1.5 px-4 rounded-md shadow-sm transition duration-200 text-sm border border-blue-200 hover:border-blue-600">
                                <i class="fas fa-folder-open mr-2 text-xs"></i> Buka Folder
                            </button>
                        `;
                    } else {
                        // Jika File: Link untuk unduh
                        actionButton = `
                            <a href="${downloadLink}" target="_blank" class="inline-flex items-center justify-center bg-green-500 hover:bg-green-600 text-white font-medium py-1.5 px-4 rounded-md shadow-sm transition duration-200 text-sm">
                                <i class="fas fa-download mr-2 text-xs"></i> Unduh File
                            </a>
                        `;
                    }
                    
                    tr.innerHTML = `
                        <td class="px-6 py-4 flex items-center">
                            <i class="${getFileIcon(file.mimeType)} text-2xl mr-4 w-8 text-center"></i>
                            <div class="flex flex-col">
                                <span class="font-medium text-gray-800 truncate max-w-[200px] md:max-w-md" title="${file.name}">${file.name}</span>
                                <span class="text-xs text-gray-400 mt-0.5">${getFileExtension(file.name, isFolder)}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center text-sm text-gray-500 whitespace-nowrap">
                            ${isFolder ? '-' : formatBytes(file.size)}
                        </td>
                        <td class="px-6 py-4 text-center whitespace-nowrap">
                            ${actionButton}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error(err);
                if (err.message.includes('File not found') || err.message.includes('insufficient permissions')) {
                    showMessage('Akses Ditolak: Pastikan folder Google Drive sudah diatur ke "Siapa saja yang memiliki link" -> "Melihat".', 'error');
                } else {
                    showMessage('Terjadi kesalahan koneksi atau pencarian.', 'error');
                }
            } finally {
                showTableLoading(false);
            }
        }

        // --- Fungsi Bantuan (Helpers) ---

        function showTableLoading(show) {
            const loader = document.getElementById('loadingIndicator');
            if (show) {
                loader.classList.remove('hidden');
                loader.classList.add('flex');
            } else {
                loader.classList.add('hidden');
                loader.classList.remove('flex');
            }
        }

        function showMessage(msg, type) {
            const msgArea = document.getElementById('messageArea');
            msgArea.innerHTML = msg;
            msgArea.className = `text-center py-4 px-6 mb-4 rounded-lg font-medium block ${type === 'error' ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-600 border border-green-200'}`;
            msgArea.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('messageArea').classList.add('hidden');
        }

        function formatBytes(bytes, decimals = 2) {
            if (!bytes || bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        function getFileExtension(filename, isFolder) {
            if (isFolder) return 'Folder Data';
            const parts = filename.split('.');
            if (parts.length > 1) {
                return parts[parts.length - 1].toUpperCase() + ' File';
            }
            return 'File';
        }

        function getFileIcon(mimeType) {
            if (!mimeType) return 'fas fa-file text-gray-400';
            if (mimeType.includes('folder')) return 'fas fa-folder text-yellow-400';
            if (mimeType.includes('image')) return 'fas fa-file-image text-blue-400';
            if (mimeType.includes('pdf')) return 'fas fa-file-pdf text-red-500';
            if (mimeType.includes('word') || mimeType.includes('document')) return 'fas fa-file-word text-blue-600';
            // Icon khusus untuk Excel karena ini Rumah Belajar Excel
            if (mimeType.includes('excel') || mimeType.includes('spreadsheet') || mimeType.includes('csv')) return 'fas fa-file-excel text-green-600';
            if (mimeType.includes('powerpoint') || mimeType.includes('presentation')) return 'fas fa-file-powerpoint text-orange-500';
            if (mimeType.includes('video')) return 'fas fa-file-video text-purple-500';
            if (mimeType.includes('zip') || mimeType.includes('rar') || mimeType.includes('compressed')) return 'fas fa-file-archive text-gray-600';
            return 'fas fa-file-alt text-gray-500';
        }

    </script>
</body>
</html>
